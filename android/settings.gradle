pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

rootProject.name = 'akrepindirici'

apply from: file("../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesSettingsGradle(settings)
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

// Expo Autolinking - node-linker=hoisted sayesinde standart path kullanılabilir
apply from: file("../node_modules/expo-modules-autolinking/scripts/autolinking.gradle")
useExpoModules()
