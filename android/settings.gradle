pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

rootProject.name = 'akrepindirici'

apply from: file("../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesSettingsGradle(settings)
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

// Expo Autolinking
def expoAutolinkingFile = file("../node_modules/expo-modules-autolinking/scripts/autolinking.gradle")
if (expoAutolinkingFile.exists()) {
    apply from: expoAutolinkingFile
    useExpoModules()
} else {
    // Fallback to dynamic resolution
    def dynamicPath = ["node", "--print", "require.resolve('expo-modules-autolinking/package.json', {paths: [rootDir.absolutePath]})"].execute().text.trim()
    apply from: new File(dynamicPath, "../scripts/autolinking.gradle")
    useExpoModules()
}
