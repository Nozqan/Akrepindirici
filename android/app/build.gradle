apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// Expo Autolinking
def expoAutolinkingScript = file("../../node_modules/expo-modules-autolinking/scripts/autolinking.gradle")
if (expoAutolinkingScript.exists()) {
    apply from: expoAutolinkingScript
    useExpoModules()
} else {
    println "WARNING: expo-modules-autolinking script not found at ${expoAutolinkingScript.absolutePath}"
    def pnpmPath = file("../../node_modules/expo/node_modules/expo-modules-autolinking/scripts/autolinking.gradle")
    if (pnpmPath.exists()) {
        apply from: pnpmPath
        useExpoModules()
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 */
react {
}

def enableProguardInReleaseBuilds = false
def jscVariant = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.anonymous.akrepindirici"
    defaultConfig {
        applicationId "com.anonymous.akrepindirici"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscVariant
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
