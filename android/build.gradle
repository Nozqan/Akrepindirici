buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.2.1")
        // Plugin versiyonunu React Native versiyonu ile tam uyumlu olacak şekilde sabitliyoruz
        classpath("com.facebook.react:react-native-gradle-plugin:0.73.4")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.20")
    }
}

allprojects {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 24
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.20"
    }
    repositories {
        google()
        mavenCentral()
        maven {
            // Dinamik yol bulma bazen CI ortamında sorun yaratabilir, göreceli yolu kesinleştiriyoruz
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        maven { url 'https://www.jitpack.io' }
    }
}
