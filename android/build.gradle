// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 24
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.20"
        gradlePluginVersion = "8.0.2"
    }
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:${ext.gradlePluginVersion}")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${ext.kotlinVersion}")
        classpath("com.facebook.react:react-native-gradle-plugin")
    }
}

plugins {
    id("com.android.application") version "${buildscript.ext.gradlePluginVersion}" apply false
    id("com.android.library") version "${buildscript.ext.gradlePluginVersion}" apply false
    id("org.jetbrains.kotlin.android") version "${buildscript.ext.kotlinVersion}" apply false
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven {
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        maven {
            url "https://maven.pkg.github.com/expo/expo/expo-gradle-plugin"
            credentials {
                username = System.getenv("GITHUB_ACTOR") ?: "github"
                password = System.getenv("GITHUB_TOKEN") ?: ""
            }
        }
        maven { url 'https://www.jitpack.io' }
    }
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}
