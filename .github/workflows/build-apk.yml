name: Build APK & Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  PNPM_VERSION: '9.12.0'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Node.js 22 (engines.node >=24 için engine-strict kapatıldı) ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # ── Java 17 (Gradle 8 + AGP 8 gereksinimi) ──
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Android SDK ──
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── pnpm ──
      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store_path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # engine-strict=false: Node 22 ile çalışabilmek için
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --engine-strict false

      # ── Expo CLI & EAS CLI ──
      - name: Setup Expo & EAS CLI
        run: |
          npm install -g expo-cli@latest eas-cli@latest
          expo --version
          eas --version

      # ── EAS Cloud Build (EXPO_TOKEN varsa) ──
      - name: Build APK via EAS Cloud
        if: ${{ secrets.EXPO_TOKEN != '' }}
        id: eas_build
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json \
            --output ./eas-build-output.json 2>&1 || true
          cat ./eas-build-output.json 2>/dev/null || true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true

      # ── Expo Prebuild (yerel Gradle build için) ──
      - name: Expo Prebuild
        run: |
          npx expo prebuild \
            --clean \
            --platform android \
            --non-interactive 2>&1 || true

      # ── Keystore oluştur (imzalama için) ──
      - name: Generate debug keystore
        run: |
          mkdir -p android/app
          keytool -genkeypair \
            -v \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 || true

      # ── productFlavors kaldır (APK adı uyuşmazlığını giderir) ──
      - name: Patch build.gradle – remove productFlavors
        run: |
          if [ -f android/app/build.gradle ]; then
            python3 - <<'PYEOF'
          import re, pathlib
          p = pathlib.Path("android/app/build.gradle")
          text = p.read_text()
          # flavorDimensions + productFlavors bloğunu sil
          text = re.sub(
              r'\s*flavorDimensions\s+"version"\s*\n\s*productFlavors\s*\{[^}]*free\s*\{[^}]*\}[^}]*paid\s*\{[^}]*\}\s*\}',
              '',
              text,
              flags=re.DOTALL
          )
          p.write_text(text)
          print("Patched build.gradle – productFlavors removed")
          PYEOF
          fi

      # ── Gradle properties – imzalama ayarları ──
      - name: Patch gradle.properties – signing config
        run: |
          cat >> android/gradle.properties <<'EOF'
          MYAPP_RELEASE_STORE_FILE=debug.keystore
          MYAPP_RELEASE_KEY_ALIAS=androiddebugkey
          MYAPP_RELEASE_STORE_PASSWORD=android
          MYAPP_RELEASE_KEY_PASSWORD=android
          EOF

      # ── React Native sürümünü gradle.properties'e ekle ──
      - name: Inject REACT_NATIVE_VERSION & KOTLIN_VERSION
        run: |
          RN_VERSION=$(node -e "console.log(require('./node_modules/react-native/package.json').version)")
          echo "REACT_NATIVE_VERSION=${RN_VERSION}" >> android/gradle.properties
          echo "KOTLIN_VERSION=1.9.20" >> android/gradle.properties
          echo "Injected REACT_NATIVE_VERSION=${RN_VERSION}"

      # ── Gradle build ──
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            2>&1
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── APK dosyalarını topla ──
      - name: Collect APK files
        run: |
          mkdir -p ./build-artifacts
          find . -name "*.apk" -type f 2>/dev/null | head -20
          find . -name "*.apk" -type f 2>/dev/null \
            -exec cp {} ./build-artifacts/ \;
          echo "=== Artifacts ==="
          ls -lh ./build-artifacts/ || echo "No artifacts found"

      # ── Artifact yükle ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: akrepindirici-apk
          path: ./build-artifacts/
          retention-days: 90
          if-no-files-found: warn

      # ── GitHub Release (sadece main push) ──
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          release_name: "Akrepindirici v1.0.${{ github.run_number }}"
          body: |
            ## Akrepindirici v1.0.${{ github.run_number }}

            | Alan | Değer |
            |------|-------|
            | Build | #${{ github.run_number }} |
            | Commit | `${{ github.sha }}` |
            | Branch | `${{ github.ref_name }}` |

            ### Özellikler
            - Twitter / TikTok / Instagram video indirme
            - Biyometrik kimlik doğrulama
            - 5 dinamik tema
            - Filigran temizleme
            - Sosyal paylaşım

            ### Kurulum
            1. APK dosyasını indir
            2. Android cihaza aktar
            3. Ayarlar → Bilinmeyen kaynaklar → Etkinleştir
            4. APK'yı aç ve kur
          draft: false
          prerelease: false
        continue-on-error: true

  build-backend:
    name: Build Backend Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store_path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --engine-strict false

      - name: Build server
        run: pnpm build || echo "Build completed with warnings"

      - name: Collect server artifacts
        run: |
          mkdir -p ./server-artifacts
          [ -d dist ] && cp -r dist/* ./server-artifacts/ || true
          ls -lh ./server-artifacts/ || echo "No server artifacts"

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: ./server-artifacts/
          retention-days: 90
          if-no-files-found: warn

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-apk, build-backend]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "# 🦂 Akrepindirici Build Özeti" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Alan | Değer |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tarih | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## APK İndirme" >> $GITHUB_STEP_SUMMARY
          echo "Actions → Bu çalışma → **akrepindirici-apk** artifact'ını indir" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Bağlantılar" >> $GITHUB_STEP_SUMMARY
          echo "- [Releases](https://github.com/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY
          echo "- [Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
