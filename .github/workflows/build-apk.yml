name: Yerel Android APK Derlemesi

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Bağımlılıkları Yükle (npm)
        run: |
          npm install --legacy-peer-deps

      - name: Android SDK Kurulumu
        uses: android-actions/setup-android@v3

      - name: APK Derle (assembleDebug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: APK'yı Yükle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
